# ============================================================
# application.properties - Main Application Configuration File
# ============================================================
# This file configures the Spring Boot application behavior.
# Spring Boot automatically reads this file on startup.
# ============================================================

# ------------------------------------------------------------
# SERVER CONFIGURATION
# port: The HTTP port the server listens on
# context-path: Base URL prefix for all API routes
# ------------------------------------------------------------
server.port=8080
server.servlet.context-path=/api

# ------------------------------------------------------------
# APPLICATION NAME
# Used in logs and Spring Boot actuator endpoints
# ------------------------------------------------------------
spring.application.name=SmartRetailSystem

# ------------------------------------------------------------
# MONGODB CONFIGURATION
# uri: Connection string to your MongoDB instance
#   Format: mongodb://<host>:<port>/<database-name>
#   For local MongoDB: mongodb://localhost:27017/smartretaildb
#   For MongoDB Atlas (cloud): use your Atlas connection string
# database: The name of the MongoDB database to use
# ------------------------------------------------------------
spring.data.mongodb.uri=mongodb://localhost:27017/smartretaildb
spring.data.mongodb.database=smartretaildb
spring.data.mongodb.auto-index-creation=true

# ------------------------------------------------------------
# SWAGGER / OPENAPI CONFIGURATION
# With context-path=/api, Swagger UI is at:
#   http://localhost:8080/api/swagger-ui/index.html
# ------------------------------------------------------------
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.display-request-duration=true

# ------------------------------------------------------------
# SPRING SECURITY - Disable default login for now
# We will configure JWT in Phase 9
# For Phase 1-8, we disable security to allow free API access
# ------------------------------------------------------------
spring.security.user.name=admin
spring.security.user.password=admin123

# ------------------------------------------------------------
# LOGGING CONFIGURATION
# Levels: TRACE < DEBUG < INFO < WARN < ERROR
# ROOT: Default level for all loggers
# com.smartretail: Our application package - set to DEBUG for details
# ------------------------------------------------------------
logging.level.root=INFO
logging.level.com.smartretail=DEBUG
logging.level.org.springframework.data.mongodb=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ------------------------------------------------------------
# JACKSON (JSON) CONFIGURATION
# serialization: How Java objects are converted to JSON
# deserialization: How JSON is converted to Java objects
# ------------------------------------------------------------
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=NON_NULL

# ------------------------------------------------------------
# INVENTORY - LOW STOCK THRESHOLD
# Products with stock below this number will trigger a warning
# This is a custom property we define for our business logic
# ------------------------------------------------------------
app.inventory.low-stock-threshold=10

# ------------------------------------------------------------
# JWT CONFIGURATION (Placeholders - Full setup in Phase 9)
# secret: Secret key for signing JWT tokens (change in production!)
# expiration: Token validity duration in milliseconds (24 hours)
# ------------------------------------------------------------
app.jwt.secret=${APP_JWT_SECRET:SmartRetailSystemSecretKey2024VeryLongAndSecureKeyForJWT}
app.jwt.expiration=86400000
